name: sphere-demo

object:
  kind: sphere
  scale: 1.0
  params:
    radius: 1.0

flow:
  speed: 10.0
  direction: [1.0, 0.0, 0.0]
  density: 1.225
  viscosity: 1.81e-5

grid:
  resolution: 48
  padding: 0.6

viz:
  surface_colormap: jet
  vector_density: 24
  arrow_size: 0.016
  near_field_layers: 3
  near_field_depth: 0.22
  show_streamlines: false
  checker_floor: true
  background: white
  interactive: true

output_dir: output
